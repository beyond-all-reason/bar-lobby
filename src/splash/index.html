<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width,initial-scale=1.0" />
        <title>Beyond All Reason</title>
        <style>
            body {
                background-color: #000;
                color: #ffffff;
                font-family: sans-serif;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
                overflow: hidden;
            }

            .logo {
                max-width: 80%;
                max-height: 60vh;
                height: auto;
                width: auto;
                margin-bottom: 20px;
            }

            .loading-container {
                display: flex;
                flex-direction: column;
                align-items: center;
                width: 200px;
            }

            .loading-text {
                font-size: 1.2rem;
                letter-spacing: 1px;
                opacity: 0.8;
                margin-bottom: 12px;
            }

            .loader-track {
                width: 100%;
                height: 3px;
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 2px;
                position: relative;
                overflow: hidden;
            }

            .loader-track {
                width: 100%;
                height: 3px;
                background-color: rgba(255, 255, 255, 0.1);
                border-radius: 2px;
                position: relative;
            }

            .loader-bar {
                position: absolute;
                height: 100%;
                width: 40px;
                background: linear-gradient(90deg, #ff4500, #ffaa00);
                border-radius: 2px;
                box-shadow:
                    0 0 8px #ff5500,
                    0 0 15px #ffaa00;
                filter: drop-shadow(0px 0px 12px rgba(255, 69, 0, 0.6));
                transform-origin: center;
                animation: hyperGlide 1.2s cubic-bezier(0.45, 0.05, 0.55, 0.95) infinite alternate;
            }

            @keyframes hyperGlide {
                0% {
                    left: 0%;
                    transform: translateX(0%) scaleX(1);
                }
                50% {
                    transform: translateX(-50%) scaleX(2.5);
                }
                100% {
                    left: 100%;
                    transform: translateX(-100%) scaleX(1);
                }
            }
        </style>
    </head>

    <body>
        <img ref="logo" class="logo" src="/BARLogoFull.png" alt="BAR Logo" />

        <div class="loading-container">
            <div class="loading-text">Loading...</div>
            <div class="loader-track">
                <div class="loader-bar"></div>
            </div>
        </div>
    </body>
</html>
